# =============================================================================
# Dummy AI — non-secret application configuration.
# Secrets (API keys, tokens, hosts) live ONLY in .env — never here.
# Env vars override these values; nested keys use SECTION__KEY (e.g. LLM__TEMPERATURE).
# =============================================================================

# --- LLM models (OpenAI; ids are non-secret config; read here, never hardcoded elsewhere) ---
llm:
  # Answering copilot agent — capable reasoning model, streams Markdown.
  answer_model: gpt-5.5
  # Guardrail classifier — cheap + fast (structured-output classification).
  guard_model: gpt-5.4-mini
  # gpt-5/o-series reasoning models ignore a custom temperature (they use their default); this
  # value is honoured by non-reasoning models (e.g. gpt-4o).
  temperature: 0.0
  # Maps to max_completion_tokens. For a reasoning model this is the COMBINED reasoning + visible
  # output budget, so keep headroom or long answers truncate (finish_reason=length).
  max_tokens: 8192
  # reasoning_effort: none | low | medium | high | xhigh (reasoning models only). null = model default.
  answer_reasoning_effort: null      # let the answerer reason at its default depth
  guard_reasoning_effort: none       # snap yes/no classification — don't burn reasoning tokens

# --- Copilot flow ---
copilot:
  max_tool_iterations: 16

# --- CORS (Vite dev origin) ---
cors:
  allow_origins:
    - http://localhost:5173

# --- Elasticsearch (non-secret behaviour; hosts/api_key come from .env) ---
elasticsearch:
  index_name: sap-logs-*
