# =============================================================================
# !!! IMPORTANT: COLD-START SEED FILE ONLY — NOT THE SOURCE OF TRUTH !!!
# =============================================================================
# This YAML file is used ONLY for the initial database seeding on first start.
# The REAL, LIVE configuration is stored in the DATABASE (config_* tables) and
# is managed via the Admin UI or the config API.
#
# ANY CHANGES TO THIS FILE AFTER THE FIRST INITIALIZATION WILL BE IGNORED.
# The system reads exclusively from the DB — this file is never re-read.
#
# To update configuration after initialization:
#   Admin UI  →  Config section
#   API       →  await set_config(domain, data)
#                in src/config/config_service.py
# =============================================================================

