# =============================================================================
# Tools configuration — per-tool behaviour settings for the AI-agent tools.
# =============================================================================
# Committed, non-secret config read directly by src/config.py (get_tools_config); in this repo the
# YAML *is* the source of truth (there is no seeding DB). Secrets (URLs, tokens, API keys) live
# only in .env — never here. See backend/CLAUDE.md.

# ---------------------------------------------------------------------------
# Prometheus advanced query tool
# ---------------------------------------------------------------------------
prometheus_advance_query:
  max_metrics_per_call: 10
  max_time_range_hours: 24
  max_data_points: 10000
  z_score_threshold: 3.0
  enable_anomaly_detection: true
  min_correlation_points: 10
  default_baseline_offset_hours: 24

# ---------------------------------------------------------------------------
# Prometheus deterministic analysis tool
# ---------------------------------------------------------------------------
prometheus_deterministic_analysis:
  max_metrics_per_call: 10
  max_time_range_hours: 24
  max_data_points: 10000

# ---------------------------------------------------------------------------
# SAP metric categorized tool
# ---------------------------------------------------------------------------
tool_sap_metric_categorized_rootis:
  metric_catalog_path: config/metric_catalog.yaml
  metric_profiles_path: config/metric_profiles.yaml

# ---------------------------------------------------------------------------
# Embedding metric retrieval (Phase 6) — semantic backend for `metric_lookup`.
# Disabled by default: metric_lookup uses the deterministic catalog resolver unless `enabled: true`
# AND OPENAI_API_KEY is set. Even when enabled, an embedding failure degrades gracefully to
# keyword+rule scoring (metric_lookup never breaks).
# ---------------------------------------------------------------------------
embedding_metric_retrieval:
  enabled: false
  embedding_model: text-embedding-3-small
